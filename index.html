<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberKick Pro Manager 2026</title>
  <!-- PapaParse para leer el CSV subido directamente en el navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg-main: #06080f;
      --bg-card: #0d1322;
      --neon-cyan: #00f0ff;
      --neon-blue: #0066ff;
      --neon-red: #ff2a5f;
      --neon-green: #39ff14;
      --neon-gold: #ffe600;
      --text-primary: #ffffff;
      --text-muted: #8a99ad;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-primary); padding-bottom: 75px; }

    header {
      background: #10172a; border-bottom: 1px solid var(--neon-cyan);
      padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-size: 1.1rem; font-weight: 900; color: var(--neon-cyan); }
    .user-stats { display: flex; gap: 8px; font-size: 0.8rem; font-weight: bold; }
    .stat-badge { background: var(--bg-card); border: 1px solid #1e2d4a; padding: 4px 8px; border-radius: 6px; }

    nav {
      position: fixed; bottom: 0; width: 100%; background: #080c18;
      border-top: 1px solid var(--neon-blue); display: flex; justify-content: space-around;
      padding: 10px 0; z-index: 1000;
    }
    .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 0.75rem; font-weight: bold; cursor: pointer; }
    .nav-btn.active { color: var(--neon-cyan); }

    .view { display: none; padding: 15px; max-width: 800px; margin: 0 auto; }
    .view.active { display: block; }

    .card { background: var(--bg-card); border: 1px solid #1a263d; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
    .card-title { font-size: 0.85rem; color: var(--neon-cyan); margin-bottom: 10px; text-transform: uppercase; }

    .btn {
      background: linear-gradient(135deg, var(--neon-blue), #0033aa); color: #fff;
      border: none; padding: 12px 16px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer;
    }
    .btn-action { background: linear-gradient(135deg, var(--neon-green), #1b8a00); color: #000; font-weight: 900; }

    .scoreboard { background: #090e1a; border: 2px solid var(--neon-cyan); border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 15px; }
    .match-teams { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
    .team-box { width: 38%; font-size: 0.95rem; }
    .score { font-size: 2rem; font-weight: 900; color: var(--neon-gold); width: 24%; }

    .feed-box { height: 160px; overflow-y: auto; background: #04060a; border: 1px solid #162238; border-radius: 6px; padding: 10px; font-size: 0.8rem; }
    .feed-item.gol { color: var(--neon-green); font-weight: bold; margin-bottom: 4px; }
    
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th, td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #162238; }

    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(6,8,15,0.95); display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 2000;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <h2 style="color:var(--neon-cyan); margin-bottom: 10px;">CYBERKICK PRO</h2>
    <p id="loading-text" style="color:var(--text-muted); font-size: 0.9rem;">Cargando datos de FC 26...</p>
  </div>

  <header>
    <div class="logo">CYBERKICK PRO</div>
    <div class="user-stats">
      <div class="stat-badge">💰 $<span id="budget-display">150</span>M</div>
      <div class="stat-badge">📅 J<span id="week-display">1</span></div>
    </div>
  </header>

  <main id="view-hub" class="view active">
    <div class="card">
      <div class="card-title">Tu Equipo</div>
      <h2 id="user-team-title">Real Madrid</h2>
      <p id="user-league-title" style="color:var(--neon-cyan); font-size:0.8rem;">LaLiga EA Sports</p>
    </div>
    <div class="card">
      <div class="card-title">Próximo Encuentro</div>
      <p id="next-match-text" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 12px;">Cargando partido...</p>
      <button class="btn btn-action" onclick="switchView('view-match')">Ir al Partido</button>
    </div>
  </main>

  <main id="view-match" class="view">
    <div class="scoreboard">
      <div style="color:var(--neon-red); font-weight:bold;" id="match-timer">00'</div>
      <div class="match-teams">
        <div class="team-box"><div id="home-name" style="font-weight:bold;">LOCAL</div></div>
        <div class="score" id="match-score">0 - 0</div>
        <div class="team-box"><div id="away-name" style="font-weight:bold;">VISITA</div></div>
      </div>
      <div id="match-status" style="font-size: 0.75rem; color: var(--text-muted);">Listo para empezar</div>
    </div>
    <button id="btn-start-sim" class="btn btn-action" style="margin-bottom: 12px;" onclick="startSimulation()">Simular Partido</button>
    <div class="card">
      <div class="card-title">Sucesos en Vivo</div>
      <div class="feed-box" id="match-feed"></div>
    </div>
  </main>

  <main id="view-table" class="view">
    <div class="card">
      <div class="card-title">Clasificación</div>
      <table>
        <thead>
          <tr><th>#</th><th style="text-align:left;">Equipo</th><th>PJ</th><th>PTS</th><th>DG</th></tr>
        </thead>
        <tbody id="standings-body"></tbody>
      </table>
    </div>
  </main>

  <nav>
    <button class="nav-btn active" onclick="switchView('view-hub', this)">🏠 Hub</button>
    <button class="nav-btn" onclick="switchView('view-match', this)">⚽ Partido</button>
    <button class="nav-btn" onclick="switchView('view-table', this)">🏆 Clasificación</button>
  </nav>

  <script>
    let db = {
      userTeamId: "Real Madrid",
      budget: 150, week: 1,
      teams: []
    };

    let simInterval = null;
    let currentOpponent = null;

    async function loadData() {
      // 1. Intentar cargar database.json si existe
      try {
        const res = await fetch('./database.json');
        if (res.ok) {
          db = await res.json();
          hideLoading();
          updateUI();
          return;
        }
      } catch (e) {}

      // 2. Si no hay json, procesar el CSV 'FC26_20250921.csv' automáticamente
      Papa.parse('./FC26_20250921.csv', {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          processCSVData(results.data);
          hideLoading();
          updateUI();
        },
        error: function() {
          document.getElementById('loading-text').innerText = "Error cargando datos. Usando datos por defecto.";
          setTimeout(hideLoading, 1000);
        }
      });
    }

    function processCSVData(rows) {
      const teamsMap = {};

      rows.forEach(row => {
        const club = row.club_name ? row.club_name.trim() : "";
        const league = row.league_name ? row.league_name.trim() : "";
        const ovr = parseInt(row.overall) || 75;

        // Filtrar equipos de LaLiga o ligas principales
        if (club && (league === "La Liga" || league === "Premier League")) {
          if (!teamsMap[club]) {
            teamsMap[club] = {
              id: club,
              name: club,
              league: league,
              ovrs: [],
              pts: 0, pj: 0, gf: 0, gc: 0, dg: 0
            };
          }
          teamsMap[club].ovrs.push(ovr);
        }
      });

      db.teams = Object.values(teamsMap).map(t => {
        const avg = t.ovrs.reduce((a, b) => a + b, 0) / (t.ovrs.length || 1);
        return {
          id: t.id,
          name: t.name,
          att: Math.round(avg + 2),
          def: Math.round(avg - 2),
          pts: 0, pj: 0, gf: 0, gc: 0, dg: 0
        };
      });

      // Asegurar que exista Real Madrid o un equipo por defecto
      if (db.teams.length === 0) {
        db.teams = [
          { id: "Real Madrid", name: "Real Madrid", att: 89, def: 87, pts: 0, pj: 0, gf: 0, gc: 0, dg: 0 },
          { id: "FC Barcelona", name: "FC Barcelona", att: 87, def: 84, pts: 0, pj: 0, gf: 0, gc: 0, dg: 0 },
          { id: "Atlético de Madrid", name: "Atlético de Madrid", att: 84, def: 83, pts: 0, pj: 0, gf: 0, gc: 0, dg: 0 }
        ];
      }
    }

    function hideLoading() {
      document.getElementById('loading-overlay').style.display = 'none';
    }

    function switchView(viewId, btn) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      if (btn) btn.classList.add('active');
    }

    function updateUI() {
      document.getElementById("budget-display").innerText = db.budget;
      document.getElementById("week-display").innerText = db.week;
      
      const userTeam = db.teams.find(t => t.id === db.userTeamId) || db.teams[0];
      const opponent = db.teams.find(t => t.id !== userTeam.id) || db.teams[1];
      currentOpponent = opponent;

      document.getElementById("user-team-title").innerText = userTeam.name;
      document.getElementById("home-name").innerText = userTeam.name;
      document.getElementById("away-name").innerText = opponent.name;
      document.getElementById("next-match-text").innerText = `${userTeam.name} vs ${opponent.name}`;

      renderStandings();
    }

    function renderStandings() {
      const tbody = document.getElementById("standings-body");
      tbody.innerHTML = "";
      const sorted = [...db.teams].sort((a,b) => b.pts - a.pts || b.dg - a.dg);
      sorted.forEach((t, i) => {
        tbody.innerHTML += `
          <tr style="${t.id === db.userTeamId ? 'color:var(--neon-cyan);font-weight:bold;' : ''}">
            <td>${i+1}</td><td style="text-align:left;">${t.name}</td><td>${t.pj}</td><td>${t.pts}</td><td>${t.dg}</td>
          </tr>`;
      });
    }

    function startSimulation() {
      document.getElementById("btn-start-sim").style.display = "none";
      document.getElementById("match-feed").innerHTML = "";
      let hScore = 0, aScore = 0, min = 0;
      const userTeam = db.teams.find(t => t.id === db.userTeamId) || db.teams[0];

      simInterval = setInterval(() => {
        min += 3;
        document.getElementById("match-timer").innerText = `${min}'`;
        
        if (Math.random() < 0.06) {
          if (Math.random() * 100 < userTeam.att) { 
            hScore++; 
            addFeed(min, `⚽ ¡GOL DE ${userTeam.name}!`, "gol"); 
          } else { 
            aScore++; 
            addFeed(min, `⚽ ¡GOL DE ${currentOpponent.name}!`, "gol"); 
          }
        }
        
        document.getElementById("match-score").innerText = `${hScore} - ${aScore}`;
        
        if (min >= 90) {
          clearInterval(simInterval);
          userTeam.pj++; currentOpponent.pj++;
          userTeam.gf += hScore; userTeam.gc += aScore; userTeam.dg = userTeam.gf - userTeam.gc;
          currentOpponent.gf += aScore; currentOpponent.gc += hScore; currentOpponent.dg = currentOpponent.gf - currentOpponent.gc;
          
          if (hScore > aScore) userTeam.pts += 3;
          else if (hScore < aScore) currentOpponent.pts += 3;
          else { userTeam.pts += 1; currentOpponent.pts += 1; }
          
          db.week++;
          renderStandings();
          document.getElementById("btn-start-sim").style.display = "block";
        }
      }, 80);
    }

    function addFeed(min, msg, type = "") {
      const feed = document.getElementById("match-feed");
      feed.innerHTML += `<div class="feed-item ${type}"><strong>${min}'</strong> ${msg}</div>`;
      feed.scrollTop = feed.scrollHeight;
    }

    window.onload = loadData;
  </script>
</body>
</html>
